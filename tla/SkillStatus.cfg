SPECIFICATION Spec

\* Small dependency graph: C depends on B, B depends on A
\* A -> B -> C (linear chain)
CONSTANTS
    Skills = {A, B, C}
    Sources = {s1, s2, s3}
    Dependencies = [A |-> {}, B |-> {A}, C |-> {B}]
    BoundSources = [A |-> {s1}, B |-> {s2}, C |-> {s3}]

INVARIANTS
    TypeOK
    StaleImpliesChanged
    AffectedImpliesTransitiveStaleDep
    CurrentImpliesClean
