name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Create .npmrc
        run: |
          cat << EOF > "$HOME/.npmrc"
          @alavida-ai:registry=https://npm.pkg.github.com
          //registry.npmjs.org/:_authToken=$NPM_TOKEN
          //npm.pkg.github.com/:_authToken=${GITHUB_PACKAGES_TOKEN:-$GITHUB_TOKEN}
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_PACKAGES_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm publish auth
        run: |
          npm whoami
          npm view @alavida/agentpack version

      - name: Create release pull request or publish
        uses: changesets/action@v1
        with:
          version: npx changeset version
          publish: npx changeset publish
          title: Version Packages
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
