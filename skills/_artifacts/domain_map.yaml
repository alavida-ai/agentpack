library:
  name: '@alavida/agentpack'
  version: '0.1.2'
  repository: 'git+https://github.com/alavida-ai/agentpack.git'
  description: 'Package-backed lifecycle CLI for building maintained skillgraphs and production-ready plugin artifacts.'
  primary_framework: 'framework-agnostic'

domains:
  - name: 'starting and shaping a skillgraph'
    slug: 'starting-and-shaping-a-skillgraph'
    description: 'Reasoning about what should become a skill, how source knowledge maps to packaged skills, and how graph boundaries should be modeled.'
  - name: 'keeping a skillgraph aligned with source truth'
    slug: 'keeping-a-skillgraph-aligned-with-source-truth'
    description: 'Reasoning about provenance, validation, stale detection, and maintenance of generated metadata over time.'
  - name: 'developing and debugging runtime skill state'
    slug: 'developing-and-debugging-runtime-skill-state'
    description: 'Reasoning about local dev links, runtime materialization, dependency inspection, and repo-local debugging workflows.'
  - name: 'shipping deployable plugin artifacts'
    slug: 'shipping-deployable-plugin-artifacts'
    description: 'Reasoning about plugin-local skills, bundled package closure, production validation, and artifact delivery.'

skills:
  - name: 'getting started on an empty skillgraph'
    slug: 'getting-started-skillgraphs'
    domain: 'starting-and-shaping-a-skillgraph'
    description: 'Bootstrap an empty repo or empty skillgraph with the right lifecycle framing, repo-root assumptions, and first validation steps.'
    type: 'lifecycle'
    covers:
      - 'initial command routing'
      - 'repo-root rule'
      - 'skills inspect'
      - 'skills validate'
      - 'skills dev'
    tasks:
      - 'bootstrap an authoring repo'
      - 'run the first inspect/validate/dev loop'
      - 'understand authored vs installed vs bundled state'
    failure_modes:
      - mistake: 'running authoring commands from the wrong repo'
        mechanism: 'Source-backed commands resolve metadata.sources relative to the current repo root, so running from the CLI repo or a consumer repo breaks provenance checks.'
        wrong_pattern: |
          cd tooling/agentpack
          agentpack skills validate ../knowledge-base/domains/value/skills/copywriting
        correct_pattern: |
          cd knowledge-base
          agentpack skills validate domains/value/skills/copywriting
        source: 'docs/introduction.mdx'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Current behavior in 0.1.x'
      - mistake: 'starting with install instead of authoring validation'
        mechanism: 'Install is a consumer workflow; authored skills need inspect and validate first so provenance and dependency metadata are correct.'
        wrong_pattern: |
          agentpack skills install @alavida/value-copywriting
        correct_pattern: |
          agentpack skills inspect domains/value/skills/copywriting
          agentpack skills validate domains/value/skills/copywriting
        source: 'skills/agentpack-cli/SKILL.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current behavior in 0.1.x'
      - mistake: 'treating the dev dashboard as the authoring surface'
        mechanism: 'The dashboard is a visibility workbench layered on top of skills dev, not the system of record for skill authoring.'
        wrong_pattern: |
          agentpack skills dev domains/value/skills/copywriting
          # edit behavior only through the dashboard mental model
        correct_pattern: |
          edit domains/value/skills/copywriting/SKILL.md
          agentpack skills dev domains/value/skills/copywriting
        source: 'docs/commands.mdx'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Dashboard introduced in 0.1.2'

  - name: 'identifying skill opportunities from knowledge'
    slug: 'identifying-skill-opportunities'
    domain: 'starting-and-shaping-a-skillgraph'
    description: 'Decide what raw knowledge or workflow should become a packaged skill, a dependency edge, or a plugin-local skill.'
    type: 'core'
    covers:
      - 'source knowledge selection'
      - 'skill boundary selection'
      - 'requires edges'
      - 'packaged skill vs plugin-local skill'
    tasks:
      - 'turn docs into candidate packaged skills'
      - 'split reusable capability from runtime shell'
      - 'choose dependency boundaries intentionally'
    failure_modes:
      - mistake: 'copying knowledge into one giant skill'
        mechanism: 'Flattening multiple capabilities into one skill destroys explicit dependency edges and makes maintenance coarse and stale-prone.'
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Domain guidance for current library positioning'
      - mistake: 'using plugin boundaries as the dependency model'
        mechanism: 'Plugins are a delivery surface; reusable capability dependencies belong in packaged skills and requires, not in hidden plugin-local coupling.'
        wrong_pattern: |
          # package all capability logic only inside a plugin skills/ tree
          plugins/website-dev/skills/copywriting/SKILL.md
        correct_pattern: |
          domains/brand/skills/copywriting/SKILL.md
          # plugin-local skill requires the packaged capability
        source: 'docs/architecture.mdx'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Current architecture in 0.1.x'
      - mistake: 'omitting provenance sources for knowledge-backed skills'
        mechanism: 'Without metadata.sources, the skillgraph loses source truth and stale detection cannot explain why a capability drifted.'
        wrong_pattern: |
          ---
          name: value-copywriting
          description: Copy.
          requires: []
          ---
        correct_pattern: |
          ---
          name: value-copywriting
          description: Copy.
          metadata:
            sources:
              - domains/value/knowledge/tone-of-voice.md
          requires: []
          ---
        source: 'docs/architecture.mdx'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Current architecture in 0.1.x'

  - name: 'authoring skillgraphs from knowledge'
    slug: 'authoring-skillgraphs-from-knowledge'
    domain: 'starting-and-shaping-a-skillgraph'
    description: 'Create packaged skills from source knowledge with explicit requires, valid package metadata, and intentional graph shape.'
    type: 'core'
    covers:
      - 'SKILL.md'
      - 'package.json'
      - 'metadata.sources'
      - 'requires'
      - 'dependency sync'
    tasks:
      - 'author a packaged skill'
      - 'compile requires into package dependencies'
      - 'inspect one skill by path or package name'
    failure_modes:
      - mistake: 'editing package dependencies instead of requires'
        mechanism: 'Requires is the authored dependency truth; package.json.dependencies is the compiled mirror and should not be hand-maintained as the source of record.'
        wrong_pattern: |
          {
            "dependencies": {
              "@alavida/methodology-gary-provost": "^1.0.0"
            }
          }
        correct_pattern: |
          ---
          requires:
            - @alavida/methodology-gary-provost
          ---
        source: 'skills/agentpack-cli/SKILL.md'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Current lifecycle model'
      - mistake: 'shipping a skill package without SKILL.md in files'
        mechanism: 'A package that excludes SKILL.md is structurally invalid even if the authored source exists locally.'
        wrong_pattern: |
          {
            "files": ["README.md"]
          }
        correct_pattern: |
          {
            "files": ["SKILL.md"]
          }
        source: 'docs/commands.mdx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current validation contract'
      - mistake: 'using missing or invalid package metadata'
        mechanism: 'Name, version, repository, and registry metadata are part of release-readiness and are enforced during validate.'
        wrong_pattern: |
          {
            "name": "@alavida/value-copywriting"
          }
        correct_pattern: |
          {
            "name": "@alavida/value-copywriting",
            "version": "1.0.0",
            "repository": { "type": "git", "url": "git+https://github.com/alavida-ai/repo.git" },
            "publishConfig": { "registry": "https://npm.pkg.github.com" }
          }
        source: 'docs/commands.mdx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current validation contract'

  - name: 'maintaining skillgraph freshness'
    slug: 'maintaining-skillgraph-freshness'
    domain: 'keeping-a-skillgraph-aligned-with-source-truth'
    description: 'Validate, inspect stale state, and keep build-state and catalog metadata aligned with changing knowledge.'
    type: 'lifecycle'
    covers:
      - 'skills validate'
      - 'skills stale'
      - '.agentpack/build-state.json'
      - '.agentpack/catalog.json'
    tasks:
      - 'detect stale skills after knowledge changes'
      - 'refresh build-state and catalog metadata'
      - 'explain why a skill is stale'
    failure_modes:
      - mistake: 'treating stale detection as automatic without validate'
        mechanism: 'Build-state is only refreshed by successful validation, so stale checks remain anchored to the last validated snapshot.'
        wrong_pattern: |
          edit domains/value/knowledge/tone-of-voice.md
          agentpack skills stale
          # expect baseline to update automatically
        correct_pattern: |
          edit domains/value/knowledge/tone-of-voice.md
          agentpack skills stale
          agentpack skills validate domains/value/skills/copywriting
        source: 'docs/commands.mdx'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Current stale contract'
      - mistake: 'not committing build-state and catalog in authoring repos'
        mechanism: 'If authored metadata is left uncommitted, stale visibility and discovery do not survive clones, CI, or teammate machines.'
        wrong_pattern: |
          git add domains/value/skills/copywriting
          git commit -m "feat: update copywriting"
        correct_pattern: |
          git add domains/value/skills/copywriting .agentpack/build-state.json .agentpack/catalog.json
          git commit -m "feat: update copywriting"
        source: 'README.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current metadata policy'
      - mistake: 'using install-state as authored provenance'
        mechanism: '.agentpack/install.json describes runtime installation, not authored source freshness or graph truth.'
        source: 'docs/current-state.mdx'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Current metadata policy'

  - name: 'developing and testing skills'
    slug: 'developing-and-testing-skills'
    domain: 'developing-and-debugging-runtime-skill-state'
    description: 'Link a local skill for runtime discovery, use the local workbench for visibility, and iterate safely on one skill graph node.'
    type: 'core'
    covers:
      - 'skills dev'
      - 'skills unlink'
      - 'local workbench'
      - '.claude/skills'
      - '.agents/skills'
    tasks:
      - 'dev-link one packaged skill'
      - 'inspect provenance and direct requires in the workbench'
      - 'reload after SKILL.md or source edits'
    failure_modes:
      - mistake: 'expecting the current agent session to pick up new links'
        mechanism: 'Already-running agent sessions may not rescan newly materialized skills, so local testing can look broken even though linking succeeded.'
        source: 'README.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current runtime note'
      - mistake: 'assuming unresolved requires block local dev links'
        mechanism: 'Skills dev still links the selected skill even when some packaged requirements are unresolved; the warning must be acted on explicitly.'
        source: 'docs/commands.mdx'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Current skills dev behavior'
      - mistake: 'using no-dashboard mode and expecting workbench actions'
        mechanism: 'The CLI-only mode suppresses the localhost workbench entirely, so validate and stale actions are not available there.'
        wrong_pattern: |
          agentpack skills dev --no-dashboard domains/value/skills/copywriting
          # expect a workbench URL and dashboard actions
        correct_pattern: |
          agentpack skills dev domains/value/skills/copywriting
        source: 'docs/introduction.mdx'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Dashboard introduced in 0.1.2'

  - name: 'repairing broken skill or plugin state'
    slug: 'repairing-broken-skill-or-plugin-state'
    domain: 'developing-and-debugging-runtime-skill-state'
    description: 'Audit and repair missing dependencies, unresolved graph edges, broken runtime installs, or malformed plugin definitions.'
    type: 'lifecycle'
    covers:
      - 'skills missing'
      - 'skills dependencies'
      - 'skills env'
      - 'skills status'
      - 'plugin inspect diagnostics'
    tasks:
      - 'trace missing runtime dependencies'
      - 'debug stale or affected dependents'
      - 'repair malformed plugin package metadata'
    failure_modes:
      - mistake: 'debugging plugin bundle failures without inspect'
        mechanism: 'Plugin inspect now returns actionable diagnostics for missing package.json and manifest files, so jumping straight to build hides the fastest repair path.'
        wrong_pattern: |
          agentpack plugin build plugins/website-dev
        correct_pattern: |
          agentpack plugin inspect plugins/website-dev
          agentpack plugin validate plugins/website-dev
        source: 'docs/commands.mdx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Diagnostics added in 0.1.2'
      - mistake: 'treating affected dependents as healthy because they still resolve'
        mechanism: 'A dependency can be stale upstream while the dependent still exists locally; dependency inspection is needed to surface affected nodes.'
        source: 'docs/current-state.mdx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current dependency visibility'
      - mistake: 'repairing missing runtime state by hand-editing local materializations'
        mechanism: 'Runtime state is reconciled through install, uninstall, and unlink flows; manual edits to .claude/skills or .agents/skills drift from install state.'
        source: 'docs/architecture.mdx'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Current runtime model'

  - name: 'shipping production plugins and packages'
    slug: 'shipping-production-plugins-and-packages'
    domain: 'shipping-deployable-plugin-artifacts'
    description: 'Turn working packaged skills into publishable packages or deployable bundled plugins with explicit closure and production checks.'
    type: 'core'
    covers:
      - 'plugin inspect'
      - 'plugin validate'
      - 'plugin build'
      - 'plugin dev'
      - 'distribution metadata'
    tasks:
      - 'validate a production plugin shell'
      - 'bundle standalone skill packages into one plugin artifact'
      - 'prepare a packaged skill for publication'
    failure_modes:
      - mistake: 'declaring plugin-local skill requires without matching devDependencies'
        mechanism: 'Bundled plugin closure depends on direct required packages being present in plugin package.json.devDependencies.'
        source: 'docs/commands.mdx'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Current plugin validate contract'
      - mistake: 'forgetting the plugin manifest and expecting validate to infer it'
        mechanism: 'Plugin commands require .claude-plugin/plugin.json and now fail with explicit diagnostics instead of inferring a runtime shell.'
        source: 'docs/commands.mdx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Diagnostics added in 0.1.2'
      - mistake: 'assuming a packaged skill and a bundled plugin are the same release unit'
        mechanism: 'A packaged skill is a reusable unit, while a plugin is a deployable runtime shell that may vendor those packages for delivery.'
        source: 'README.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current lifecycle model'

tensions:
  - name: 'fast local iteration vs governed source truth'
    skills: ['developing-and-testing-skills', 'maintaining-skillgraph-freshness']
    description: 'Quick dev-link iteration is fast, but the durable stale baseline only updates through validation and committed metadata.'
    implication: 'An agent that optimizes only for speed will leave the graph apparently working locally while authored provenance drifts.'
  - name: 'simple delivery shell vs reusable graph boundaries'
    skills: ['identifying-skill-opportunities', 'shipping-production-plugins-and-packages']
    description: 'It is tempting to hide capability boundaries inside a plugin, but production delivery works best when reusable skills remain packaged and explicit.'
    implication: 'An agent that optimizes only for shipping speed will collapse reusable skills into plugin-local state.'
  - name: 'empty-repo simplicity vs production-ready lifecycle discipline'
    skills: ['getting-started-skillgraphs', 'shipping-production-plugins-and-packages']
    description: 'The easiest first command path is not enough to produce publishable metadata or a validated plugin shell.'
    implication: 'An agent that only follows the happy path will skip the release-readiness checks that matter later.'

